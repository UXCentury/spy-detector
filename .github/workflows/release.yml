name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri release
        run: npm run tauri build

      - name: Collect installers
        id: collect
        shell: pwsh
        run: |
          $artifactDir = "dist"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $bundleDir = "src-tauri/target/release/bundle"
          if (Test-Path "$bundleDir/nsis") {
            Get-ChildItem "$bundleDir/nsis/*.exe" | Copy-Item -Destination "$artifactDir/SpyDetectorSetup.exe"
          } elseif (Test-Path "$bundleDir/msi") {
            Get-ChildItem "$bundleDir/msi/*.msi" | Copy-Item -Destination "$artifactDir/SpyDetectorSetup.msi"
          } else {
            Write-Error "No installer artifacts produced"
            exit 1
          }

      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: spy-detector-windows-unsigned
          path: dist/
          if-no-files-found: error

      - name: SignPath Signing
        uses: signpath/github-action-submit-signing-request@v1
        with:
          # TODO: Replace 'your-org-id' with your SignPath organization ID after onboarding.
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: "your-org-id"
          project-slug: "spy-detector"
          signing-policy-slug: "release-signing"
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: "signed"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spy-detector-windows-signed
          path: signed/
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: signed/*
          generate_release_notes: true
          draft: false
