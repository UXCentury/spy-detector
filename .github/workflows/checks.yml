name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - name: Build frontend (produces ../out for tauri::generate_context!)
        run: npm run build
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets --no-deps -- -D warnings
        working-directory: src-tauri
      - run: cargo test --all
        working-directory: src-tauri
